name: sgo_mobile
description: SGO - Sistema de Gestão Operacional de Obras (Mobile)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Auth & HTTP
  supabase_flutter: ^2.5.6
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.0.0
  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^13.2.4
  # UI
  google_fonts: ^6.2.1
  lucide_icons: ^1.0.0
  cached_network_image: ^3.3.1
  # Utilities
  intl: ^0.19.0
  image_picker: ^1.1.2
  geolocator: ^12.0.0
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  # Dev
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
